# Provider-Agnostic Secret Abstraction
# In a real environment, this would integrate with ExternalSecrets Operator 
# fetching from AWS Secrets Manager, Azure Key Vault, or HashiCorp Vault.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cuhp-app-secrets
  namespace: cuhp-prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: enterprise-vault-cluster-store # Reference to the secure vault
    kind: ClusterSecretStore
  target:
    name: cuhp-app-secret-env # Name of the generated k8s Secret
    creationPolicy: Owner
  data:
    - secretKey: MONGO_URI
      remoteRef:
        key: cuhp/prod/database
        property: connection_string
    - secretKey: JWT_SECRET
      remoteRef:
        key: cuhp/prod/auth
        property: jwt_secret
    - secretKey: AI_PROVIDER_API_KEY
      remoteRef:
        key: cuhp/prod/ai
        property: api_key
    - secretKey: SMTP_PASS
      remoteRef:
        key: cuhp/prod/smtp
        property: password
