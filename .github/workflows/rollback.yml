name: Rollback Environment
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      commit_sha:
        description: 'Commit SHA to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Rollback Application
        run: |
          echo "Initiating rollback for ${{ github.event.inputs.environment }} to commit ${{ github.event.inputs.commit_sha }}"
          bash scripts/deployment/deploy.sh ${{ github.event.inputs.environment }} ${{ github.event.inputs.commit_sha }}
