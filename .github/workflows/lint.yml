name: Lint & Type Check
on:
  pull_request:
    branches: [ main, development ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install & Lint Backend
        run: |
          cd backend
          npm ci
          npm run lint
          npx tsc --noEmit
      - name: Install & Lint Frontend
        run: |
          cd frontend
          npm ci
          npm run lint
          npx tsc --noEmit
